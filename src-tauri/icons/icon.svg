<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- A-Cut app icon master — concept 3-2 "담기" (a photo dropping into the archive box) -->
  <defs>
    <linearGradient id="bgSlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C3642"/>
      <stop offset="1" stop-color="#161C24"/>
    </linearGradient>
    <linearGradient id="imgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FD0C6"/>
      <stop offset="1" stop-color="#4E9C8E"/>
    </linearGradient>
    <linearGradient id="boxBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#414D5A"/>
      <stop offset="1" stop-color="#242D37"/>
    </linearGradient>
    <filter id="squircleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 824x824 squircle centered on 1024 canvas (Apple icon grid) -->
  <g filter="url(#squircleShadow)">
    <g transform="translate(100,100) scale(8.24)">
      <rect width="100" height="100" rx="22.5" fill="url(#bgSlate)"/>

      <!-- descending photo card -->
      <g transform="rotate(-7 50 30)">
        <rect x="33.2" y="16.8" width="36" height="28" rx="2.5" fill="#000000" opacity="0.16"/>
        <rect x="32" y="15" width="36" height="28" rx="2.5" fill="#F2F5F7"/>
        <rect x="35" y="18" width="30" height="18.5" rx="1.5" fill="url(#imgSky)"/>
        <circle cx="44" cy="24" r="2.7" fill="#FFE9A8"/>
        <path d="M35 36.5 L44 26 L50 33 L54.5 28 L65 36.5 Z" fill="#25635A"/>
      </g>

      <!-- drop motion hint -->
      <line x1="50" y1="47.5" x2="50" y2="52" stroke="#3FBFAC" stroke-width="2.6" stroke-linecap="round"/>

      <!-- box mouth with tidy filed photos visible inside -->
      <rect x="27" y="56" width="46" height="7.5" rx="3.6" fill="#0D1319"/>
      <rect x="32.5" y="58" width="14" height="2.6" rx="1.3" fill="#949FA9"/>
      <rect x="53.5" y="58" width="14" height="2.6" rx="1.3" fill="#7E8893"/>

      <!-- box front -->
      <rect x="23" y="61" width="54" height="19" rx="5" fill="url(#boxBody)"/>
      <circle cx="66.5" cy="68" r="3.4" fill="#3FBFAC" opacity="0.22"/>
      <circle cx="66.5" cy="68" r="1.7" fill="#3FBFAC"/>
      <rect x="31" y="69" width="20" height="3.4" rx="1.7" fill="#1B222B"/>
    </g>
  </g>
</svg>
